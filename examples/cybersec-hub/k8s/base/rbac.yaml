apiVersion: v1
kind: ServiceAccount
metadata:
  name: cybersec-hub-sa
  namespace: agentic
  labels:
    app: cybersec-hub
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cybersec-hub-role
  namespace: agentic
  labels:
    app: cybersec-hub
rules:
# Allow creating pods for isolated tool execution
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["create", "get", "list", "delete"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
# Allow reading configmaps and secrets
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list"]
# Allow creating jobs for scheduled scans
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["create", "get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cybersec-hub-rolebinding
  namespace: agentic
  labels:
    app: cybersec-hub
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cybersec-hub-role
subjects:
- kind: ServiceAccount
  name: cybersec-hub-sa
  namespace: agentic
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cybersec-hub-netpol
  namespace: agentic
  labels:
    app: cybersec-hub
spec:
  podSelector:
    matchLabels:
      app: cybersec-hub
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: agentic
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 3000
  egress:
  # Allow DNS
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: UDP
      port: 53
  # Allow external connections (for security testing)
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32  # Block instance metadata
  # Allow internal service communication
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 6379  # Redis
    - protocol: TCP
      port: 5000  # MLFlow
    - protocol: TCP
      port: 11434 # Ollama
