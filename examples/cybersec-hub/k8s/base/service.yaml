apiVersion: v1
kind: Service
metadata:
  name: cybersec-hub
  namespace: agentic
  labels:
    app: cybersec-hub
    component: security
spec:
  type: ClusterIP
  selector:
    app: cybersec-hub
  ports:
  - name: api
    port: 8080
    targetPort: api
    protocol: TCP
  - name: dashboard
    port: 3000
    targetPort: dashboard
    protocol: TCP
  sessionAffinity: ClientIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cybersec-hub
  namespace: agentic
  labels:
    app: cybersec-hub
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - cybersec.local
    secretName: cybersec-tls
  rules:
  - host: cybersec.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: cybersec-hub
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cybersec-hub
            port:
              number: 3000
