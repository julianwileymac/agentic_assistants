apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agentic

resources:
  - base/deployment.yaml
  - base/service.yaml
  - base/configmap.yaml
  - base/rbac.yaml
  - base/cronjobs.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: cybersec-hub
      app.kubernetes.io/component: security
      app.kubernetes.io/part-of: agentic-assistants
      app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  documentation: "https://github.com/agentic-assistants/cybersec-hub"
  contact: "security@example.com"

images:
  - name: cybersec-hub
    newTag: latest

configMapGenerator:
  - name: cybersec-env
    literals:
      - ENVIRONMENT=production
      - VERSION=1.0.0

# Overlays for different environments
# Use: kubectl apply -k overlays/production
