apiVersion: v1
kind: ConfigMap
metadata:
  name: agentic-config
  namespace: agentic
  labels:
    app: agentic-assistants
data:
  # Application settings
  AGENTIC_LOG_LEVEL: "INFO"
  AGENTIC_DATA_DIR: "/data"
  
  # Cache settings
  CACHE_BACKEND: "redis"
  REDIS_URL: "redis://redis:6379"
  CACHE_DEFAULT_TTL: "3600"
  
  # MLFlow settings
  MLFLOW_TRACKING_URI: "http://mlflow:5000"
  
  # Telemetry settings
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "agentic-assistants"
  
  # Feature store settings
  FEATURE_STORE_TYPE: "local"
  FEATURE_STORE_PATH: "/data/features"
  
  # Vector DB settings
  VECTORDB_PATH: "/data/vectordb"
  VECTORDB_EMBEDDING_MODEL: "all-MiniLM-L6-v2"
  
  # DataHub settings
  DATAHUB_ENABLED: "true"
  DATAHUB_GMS_URL: "http://datahub-datahub-gms.data-services.svc.cluster.local:8080"
  DATAHUB_FRONTEND_URL: "http://datahub.local"
  DATAHUB_ICEBERG_ENABLED: "true"
  
  # Iceberg settings
  ICEBERG_CATALOG_URI: "http://datahub-datahub-gms.data-services.svc.cluster.local:8080/iceberg"
  ICEBERG_WAREHOUSE: "s3://iceberg-warehouse/"
  ICEBERG_S3_ENDPOINT: "http://minio.data-services.svc.cluster.local:9000"
  ICEBERG_S3_ACCESS_KEY: "minioadmin"
  ICEBERG_S3_SECRET_KEY: "minioadmin123"
  
  # dbt settings
  DBT_ENABLED: "true"
  DBT_TARGET: "prod"
  DBT_POSTGRES_HOST: "postgresql.data-services.svc.cluster.local"
  DBT_POSTGRES_PORT: "5432"
  DBT_POSTGRES_DATABASE: "agentic"
  DBT_POSTGRES_USER: "postgres"
  DBT_POSTGRES_PASSWORD: "postgres123"
