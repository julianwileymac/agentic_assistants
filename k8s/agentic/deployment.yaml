apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentic-api
  namespace: agentic
  labels:
    app: agentic-api
    app.kubernetes.io/name: agentic-assistants
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: agentic-api
  template:
    metadata:
      labels:
        app: agentic-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: agentic-assistants:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: agentic-config
          env:
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow:5000"
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: data-volume
              mountPath: /data
            - name: config-volume
              mountPath: /config
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: agentic-data-pvc
        - name: config-volume
          configMap:
            name: agentic-config
---
apiVersion: v1
kind: Service
metadata:
  name: agentic-api
  namespace: agentic
  labels:
    app: agentic-api
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    app: agentic-api
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: agentic-data-pvc
  namespace: agentic
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
