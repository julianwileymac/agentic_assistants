apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentic-ingress
  namespace: agentic
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: agentic.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agentic-api
                port:
                  number: 8080
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow
                port:
                  number: 5000
          - path: /dagster
            pathType: Prefix
            backend:
              service:
                name: dagster-webserver
                port:
                  number: 3000