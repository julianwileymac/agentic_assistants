# =============================================================================
# Agentic Assistants - Docker Compose Configuration
# =============================================================================
# This file defines services for the Agentic Assistants framework.
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d mlflow       # Start only MLFlow
#   docker-compose up agentic-api     # Start only the API
#   docker-compose up agentic-ide     # Start only the IDE
#   docker-compose down               # Stop all services
#   docker-compose logs -f            # View logs
#
# Services:
#   - agentic-api: Python FastAPI backend (port 8080)
#   - agentic-ide: Theia IDE frontend (port 3000)
#   - MLFlow: Experiment tracking server (port 5000)
#   - Jaeger: Distributed tracing UI (port 16686)
#   - OTEL Collector: OpenTelemetry collector (port 4317)
# =============================================================================

services:
  # ===========================================================================
  # Agentic API - Python Backend
  # ===========================================================================
  agentic-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agentic-api
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./mlruns:/app/mlruns
      - ./config:/app/config
    environment:
      - AGENTIC_DATA_DIR=/app/data
      - AGENTIC_LOG_LEVEL=INFO
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      # DataHub
      - DATAHUB_ENABLED=${DATAHUB_ENABLED:-false}
      - DATAHUB_GMS_URL=${DATAHUB_GMS_URL:-http://localhost:8080}
      - DATAHUB_FRONTEND_URL=${DATAHUB_FRONTEND_URL:-http://datahub.local}
      # Iceberg
      - ICEBERG_CATALOG_URI=${ICEBERG_CATALOG_URI:-http://localhost:8080/iceberg}
      - ICEBERG_WAREHOUSE=${ICEBERG_WAREHOUSE:-s3://iceberg-warehouse/}
      - ICEBERG_S3_ENDPOINT=${ICEBERG_S3_ENDPOINT:-http://minio:9000}
      - ICEBERG_S3_ACCESS_KEY=${ICEBERG_S3_ACCESS_KEY:-minioadmin}
      - ICEBERG_S3_SECRET_KEY=${ICEBERG_S3_SECRET_KEY:-minioadmin123}
      # dbt
      - DBT_ENABLED=${DBT_ENABLED:-false}
      - DBT_PROJECT_DIR=${DBT_PROJECT_DIR:-}
      - DBT_PROFILES_DIR=${DBT_PROFILES_DIR:-}
      - DBT_TARGET=${DBT_TARGET:-dev}
      - DBT_POSTGRES_HOST=${DBT_POSTGRES_HOST:-postgres}
      - DBT_POSTGRES_PORT=${DBT_POSTGRES_PORT:-5432}
      - DBT_POSTGRES_DATABASE=${DBT_POSTGRES_DATABASE:-agentic}
      - DBT_POSTGRES_USER=${DBT_POSTGRES_USER:-postgres}
      - DBT_POSTGRES_PASSWORD=${DBT_POSTGRES_PASSWORD:-postgres123}
    depends_on:
      - mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Agentic IDE (JupyterLab - primary)
  # ===========================================================================
  agentic-ide:
    build:
      context: .
      dockerfile: docker/Dockerfile.lab
    container_name: agentic-lab
    ports:
      - "3000:3000"
    volumes:
      - ./data:/workspace/data:cached
      - ./examples:/workspace/examples:cached
      - ./notebooks:/workspace/notebooks:cached
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - agentic-api
    restart: unless-stopped

  # ===========================================================================
  # Theia IDE (primary web IDE)
  # ===========================================================================
  theia-ide:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.ide
    container_name: agentic-theia
    ports:
      - "3001:3001"
    volumes:
      - ./data:/home/theia/data:cached
      - ./examples:/home/theia/examples:cached
      - ./notebooks:/home/theia/notebooks:cached
      - ./config:/home/theia/config:cached
    environment:
      - AGENTIC_BACKEND_URL=http://agentic-api:8080
      - THEIA_WEBVIEW_EXTERNAL_ENDPOINT={{hostname}}
    depends_on:
      - agentic-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  # ===========================================================================
  # PostgreSQL Database (optional)
  # ===========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: agentic-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=agentic
      - POSTGRES_USER=agentic
      - POSTGRES_PASSWORD=agentic123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - postgres
      - dagster

  # ===========================================================================
  # Prefect Server (optional orchestration)
  # ===========================================================================
  prefect-server:
    image: prefecthq/prefect:2-latest
    container_name: prefect-server
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://0.0.0.0:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
      - PREFECT_API_DATABASE_CONNECTION_URL=postgresql+asyncpg://prefect:prefect123@postgres:5432/prefect
    command: prefect server start --host 0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4200/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    profiles:
      - prefect

  # ===========================================================================
  # Prefect Worker (optional)
  # ===========================================================================
  prefect-worker:
    image: prefecthq/prefect:2-latest
    container_name: prefect-worker
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    command: prefect worker start --pool default-pool
    depends_on:
      - prefect-server
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    profiles:
      - prefect

  # ===========================================================================
  # Sync Agent (optional data synchronization)
  # ===========================================================================
  sync-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: agentic-sync-agent
    environment:
      - AGENTIC_DATA_DIR=/app/data
      - DATABASE_TYPE=postgres
      - POSTGRES_HOST=postgres
      - POSTGRES_DATABASE=agentic
      - POSTGRES_USER=agentic
      - POSTGRES_PASSWORD=agentic123
    command: python -m agentic_assistants.sync.agent
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    profiles:
      - sync

  # ===========================================================================
  # MLFlow Tracking Server
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: agentic-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # OpenTelemetry Collector
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: agentic-otel-collector
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # Prometheus metrics
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    restart: unless-stopped

  # ===========================================================================
  # Jaeger - Distributed Tracing
  # ===========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: agentic-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
      - "14250:14250"   # gRPC collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

  # ===========================================================================
  # Redis - Distributed Cache
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: agentic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===========================================================================
  # MinIO - S3-Compatible Object Storage
  # ===========================================================================
  minio:
    image: minio/minio:latest
    container_name: agentic-minio
    ports:
      - "9000:9000"     # API
      - "9001:9001"     # Console
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # Feast Feature Store (Optional)
  # ===========================================================================
  feast-ui:
    image: feastdev/feature-server:latest
    container_name: agentic-feast
    ports:
      - "6566:6566"
    volumes:
      - ./data/feast:/feast
    environment:
      - FEAST_REPO_PATH=/feast
    depends_on:
      - redis
    profiles:
      - feast
    restart: unless-stopped

  # ===========================================================================
  # Dagster Orchestration
  # ===========================================================================
  dagster-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
    command:
      - dagster-webserver
      - -h
      - "0.0.0.0"
      - -p
      - "3000"
      - -w
      - /opt/dagster/dagster_home/workspace.yaml
    ports:
      - "3100:3000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /app
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_DB: agentic
      DAGSTER_PG_USERNAME: agentic
      DAGSTER_PG_PASSWORD: agentic123
    volumes:
      - dagster_data:/opt/dagster/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    profiles:
      - dagster
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
    command: ["dagster-daemon", "run"]
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /app
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_DB: agentic
      DAGSTER_PG_USERNAME: agentic
      DAGSTER_PG_PASSWORD: agentic123
    volumes:
      - dagster_data:/opt/dagster/dagster_home
    depends_on:
      postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    profiles:
      - dagster
    restart: unless-stopped

  dagster-code:
    build:
      context: .
      dockerfile: docker/Dockerfile.dagster
    working_dir: /app
    command:
      - dagster
      - api
      - grpc
      - -h
      - "0.0.0.0"
      - -p
      - "4000"
      - -m
      - agentic_assistants.orchestration.dagster_code
    ports:
      - "4000:4000"
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      PYTHONPATH: /app
      DAGSTER_PG_HOST: postgres
      DAGSTER_PG_PORT: "5432"
      DAGSTER_PG_DB: agentic
      DAGSTER_PG_USERNAME: agentic
      DAGSTER_PG_PASSWORD: agentic123
      DAGSTER_CURRENT_IMAGE: agentic-assistants-dagster:latest
    volumes:
      - dagster_data:/opt/dagster/dagster_home
      - ./src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 90s
    profiles:
      - dagster
    restart: unless-stopped

volumes:
  mlflow-data:
    driver: local
  agentic-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  postgres_data:
    driver: local
  prefect_data:
    driver: local
  dagster_data:
    driver: local

networks:
  default:
    name: agentic-network

