# =============================================================================
# Agentic Assistants - Docker Compose Configuration
# =============================================================================
# This file defines optional services for the Agentic Assistants framework.
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose up -d mlflow       # Start only MLFlow
#   docker-compose down               # Stop all services
#   docker-compose logs -f            # View logs
#
# Services:
#   - MLFlow: Experiment tracking server (port 5000)
#   - Jaeger: Distributed tracing UI (port 16686)
#   - OTEL Collector: OpenTelemetry collector (port 4317)
# =============================================================================

version: '3.8'

services:
  # ===========================================================================
  # MLFlow Tracking Server
  # ===========================================================================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    container_name: agentic-mlflow
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow
    environment:
      - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ===========================================================================
  # OpenTelemetry Collector
  # ===========================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    container_name: agentic-otel-collector
    ports:
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "8888:8888"     # Prometheus metrics
    volumes:
      - ./docker/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    depends_on:
      - jaeger
    restart: unless-stopped

  # ===========================================================================
  # Jaeger - Distributed Tracing
  # ===========================================================================
  jaeger:
    image: jaegertracing/all-in-one:1.53
    container_name: agentic-jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # HTTP collector
      - "14250:14250"   # gRPC collector
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    restart: unless-stopped

volumes:
  mlflow-data:
    driver: local

networks:
  default:
    name: agentic-network

