[tool.poetry]
name = "agentic-assistants"
version = "0.1.0"
description = "A local framework for experimenting with multi-agent libraries, MLOps and LLMOps tooling"
authors = ["Julian Wiley"]
license = "MIT"
readme = "README.md"
packages = [{include = "agentic_assistants", from = "src"}]

[tool.poetry.scripts]
agentic = "agentic_assistants.cli:cli"

[tool.poetry.dependencies]
python = "^3.10"
click = "^8.1"
pydantic = "^2.0"
pydantic-settings = "^2.0"
python-dotenv = "^1.0"
httpx = "^0.27"
rich = "^13.0"
pyyaml = "^6.0"

# MLOps
mlflow = "^2.10"

# Telemetry
opentelemetry-api = "^1.22"
opentelemetry-sdk = "^1.22"
opentelemetry-exporter-otlp = "^1.22"
opentelemetry-instrumentation-httpx = "^0.43b0"

# Agent Frameworks
crewai = "^0.80"
langchain = "^0.3"
langgraph = "^0.2"
langchain-ollama = "^0.2"

# Notebooks
jupyter = "^1.0"
ipykernel = "^6.0"

[tool.poetry.group.dev.dependencies]
pytest = "^8.0"
pytest-asyncio = "^0.23"
pytest-cov = "^4.1"
ruff = "^0.2"
mypy = "^1.8"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

