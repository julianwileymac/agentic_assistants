version: 1
templates:
  - id: quickstart-chat-agent
    name: Quickstart Chat Agent
    category: agents
    level: starter
    description: Minimal local Ollama chat agent with configuration scaffold.
    tags: [ollama, local, chat, starter]
    asset_dir: quickstart-chat-agent
    run_hint: python app.py

  - id: multi-agent-research-crew
    name: Multi-Agent Research Crew
    category: agents
    level: intermediate
    description: Crew-style local research workflow with planner, researcher, and writer roles.
